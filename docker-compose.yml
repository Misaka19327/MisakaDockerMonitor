services:
  monitor:
    build: .
    container_name: misaka-docker-monitor
    ports:
      - "3000:3000"
    volumes:
      # Mount Docker socket to access host Docker
      - /var/run/docker.sock:/var/run/docker.sock
      # Expose host compose projects for compose path validation and updates
      - /data:/data
      # Persist data
      - monitor-data:/app/data
    environment:
      - NODE_ENV=production
      - STORAGE_TYPE=mysql
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=test
      - MYSQL_DATABASE=misaka_docker_monitor
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-http://localhost:8123}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:-docker_monitor}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - SQLITE_PATH=/app/data/logs.db
      - DOCKER_SOCKET=/var/run/docker.sock
      - TIMEZONE=${TIMEZONE:-Asia/Shanghai}
      - TZ=${TIMEZONE:-Asia/Shanghai}
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-change-me}
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_TTL_SECONDS=${JWT_TTL_SECONDS:-86400}
      - RETAIN_LOGS_ON_RESTART=true
      - HOST=0.0.0.0
      - PORT=3000
    restart: unless-stopped
    networks:
      - base

networks:
  base:
    external: true

volumes:
  monitor-data:
